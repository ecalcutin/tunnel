services:
  core:
    build:
      context: .
      dockerfile: Dockerfile
    image: ecalcutin/tunnel:latest
    ports:
      - '3000:3000'
      - '51820:51820/udp'
      - '51821:51821/tcp'
    env_file:
      - .env
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun
