services:
  core:
    privileged: true
    depends_on:
      - database
    image: ecalcutin/tunnel:latest
    ports:
      - '3000:3000'
      - '51820:51820/udp'
    env_file:
      - .env
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun

  database:
    image: mongo:latest
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: public_username
      MONGO_INITDB_ROOT_PASSWORD: public_password
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
