services:
  core:
    extends:
      file: docker-compose.yml
      service: core
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - '3000:3000'
      - '51820:51820/udp'
      - '51821:51821/tcp'
      - '9229:9229'

  wireguard-client:
    image: amneziavpn/amneziawg-go
    command: sh -c "apk add openresolv && tail -f /dev/null"
    privileged: true
    volumes:
      - ./wg0.conf:/etc/amnezia/amneziawg/wg0.conf
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun
