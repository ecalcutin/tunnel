name: Build and deploy application

on:
  push:
    branches: ['main']

jobs:
  increment-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.increment.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Increment version
        id: increment
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          VERSION=$(npm version patch)

          git push --follow-tags
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: [increment-version]
    outputs:
      image_tag: ${{ needs.increment-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Pull latest changes
        run: git pull origin main
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      - name: Build and push
        run: |
          docker build -t ecalcutin/tunnel:latest .
          docker push ecalcutin/tunnel:latest

  deploy:
    needs: [build]
    uses: ./.github/workflows/deploy-to-vps.yaml
    # secrets:
    #   SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
    #   SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
    #   HOST: ${{ vars.HOST }}
